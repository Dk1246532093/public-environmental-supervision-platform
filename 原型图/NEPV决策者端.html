<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东软空气质量环保公众监督平台 - NEPV决策者端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #0a1628;
            padding: 20px;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 100%);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.3);
        }

        /* 顶部标题栏 */
        .dashboard-header {
            background: linear-gradient(90deg, #0d1b2a 0%, #1b3a4b 50%, #0d1b2a 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2a9d8f;
            position: relative;
        }

        .dashboard-header::before,
        .dashboard-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            width: 100px;
            height: 2px;
            background: #00d4ff;
        }

        .dashboard-header::before {
            left: 20%;
        }

        .dashboard-header::after {
            right: 20%;
        }

        .header-title {
            font-size: 24px;
            color: #00d4ff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            letter-spacing: 4px;
        }

        .header-time {
            color: #7fb3d3;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-time::before {
            content: '◷';
            color: #00d4ff;
        }

        /* 主内容区 */
        .dashboard-content {
            padding: 20px;
            display: grid;
            grid-template-columns: 300px 1fr 340px;
            gap: 20px;
            min-height: 750px;
        }

        /* 面板样式 */
        .panel-box {
            background: rgba(13, 27, 42, 0.8);
            border: 1px solid #2a9d8f;
            border-radius: 8px;
            padding: 15px;
            position: relative;
        }

        .panel-box::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 2px;
            background: #00d4ff;
        }

        .panel-title {
            color: #7fb3d3;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* 左侧面板 */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 仪表盘 */
        .gauge-row {
            display: flex;
            gap: 10px;
        }

        .gauge-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gauge {
            width: 100px;
            height: 100px;
            position: relative;
        }

        .gauge-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 180deg,
                    #e63946 0deg 30deg,
                    #f4a261 30deg 60deg,
                    #e9c46a 60deg 90deg,
                    #2a9d8f 90deg 180deg);
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
        }

        .gauge-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: #0d1b2a;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .gauge-value {
            font-size: 22px;
            font-weight: bold;
            color: #2a9d8f;
        }

        .gauge-label {
            font-size: 10px;
            color: #7fb3d3;
        }

        .gauge-needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 38px;
            background: #00d4ff;
            transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(-45deg);
            box-shadow: 0 0 5px #00d4ff;
        }

        .gauge-needle::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #00d4ff;
            border-radius: 50%;
        }

        /* 饼图 */
        .pie-chart-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pie-chart {
            width: 120px;
            height: 120px;
            position: relative;
            flex-shrink: 0;
        }

        .pie {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#e63946 0deg 72deg,
                    #f4a261 72deg 144deg,
                    #e9c46a 144deg 216deg,
                    #2a9d8f 216deg 288deg,
                    #457b9d 288deg 360deg);
        }

        .pie-legend {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #7fb3d3;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        /* 折线图 */
        .line-chart {
            height: 100px;
            position: relative;
            padding: 5px;
        }

        .line-chart-svg {
            width: 100%;
            height: 100%;
        }

        /* 中间地图区域 - 优化后 */
        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 10px;
        }

        .china-map-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .china-map {
            width: 100%;
            max-width: 700px;
            height: 550px;
            position: relative;
        }

        /* SVG 中国地图 */
        .map-svg {
            width: 100%;
            height: 100%;
        }

        .province-path {
            stroke: #1b3a4b;
            stroke-width: 1;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .province-path:hover {
            stroke: #00d4ff;
            stroke-width: 2;
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.6));
            transform: scale(1.02);
            transform-origin: center;
        }

        /* 各省颜色 - 根据AQI等级 */
        .level-excellent {
            fill: #2a9d8f;
        }

        .level-good {
            fill: #457b9d;
        }

        .level-mild {
            fill: #e9c46a;
        }

        .level-moderate {
            fill: #f4a261;
        }

        .level-severe {
            fill: #e63946;
        }

        .level-serious {
            fill: #9d4edd;
        }

        /* 地图装饰效果 */
        .map-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            background: radial-gradient(ellipse at center, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        /* 地图图例 */
        .map-legend {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(13, 27, 42, 0.9);
            border: 1px solid #2a9d8f;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .map-legend-title {
            color: #00d4ff;
            font-size: 12px;
            margin-bottom: 5px;
            text-align: center;
        }

        .map-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #7fb3d3;
        }

        .map-legend-color {
            width: 20px;
            height: 12px;
            border-radius: 2px;
        }

        /* 地图标签 */
        .province-label {
            font-size: 10px;
            fill: rgba(255, 255, 255, 0.9);
            text-anchor: middle;
            pointer-events: none;
            font-weight: 500;
        }

        /* 右侧面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 柱状图 */
        .bar-chart {
            height: 110px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 0 5px 20px 5px;
            border-bottom: 1px solid #2a9d8f;
            position: relative;
        }

        .bar-chart::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 20px;
            width: 1px;
            background: #2a9d8f;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            flex: 1;
        }

        .bar {
            width: 10px;
            border-radius: 2px 2px 0 0;
            transition: all 0.3s;
        }

        .bar:hover {
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .bar-label {
            font-size: 9px;
            color: #7fb3d3;
            white-space: nowrap;
        }

        /* 响应式 */
        @media (max-width: 1400px) {
            .dashboard-content {
                grid-template-columns: 260px 1fr 300px;
            }
        }

        @media (max-width: 1200px) {
            .dashboard-content {
                grid-template-columns: 1fr;
            }

            .center-panel {
                order: -1;
            }
        }
    </style>
</head>
